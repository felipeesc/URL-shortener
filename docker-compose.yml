version: "3.8"

services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=url-shortener-cluster
      - CASSANDRA_DC=datacenter1
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./cassandra/init.cql:/docker-entrypoint-initdb.d/init.cql
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10

  app:
    build: .
    container_name: url-shortener
    ports:
      - "8080:8080"
    environment:
      - SPRING_CASSANDRA_CONTACT_POINTS=cassandra
      - SPRING_CASSANDRA_PORT=9042
      - SPRING_CASSANDRA_KEYSPACE_NAME=url_shortener
      - SPRING_CASSANDRA_LOCAL_DATACENTER=datacenter1
      - APP_BASE_URL=http://localhost:8080
    depends_on:
      cassandra:
        condition: service_healthy

volumes:
  cassandra_data:
